<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>u13 Django</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #fff;
            height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #38bdf8;
        }

        nav a {
            color: #cbd5f5;
            margin-left: 20px;
            text-decoration: none;
            transition: 0.3s;
        }

        nav a:hover {
            color: #38bdf8;
        }

        .hero {
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 80vh;
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 18px;
            color: #94a3b8;
            margin-bottom: 30px;
            max-width: 500px;
        }

        .btn {
            padding: 12px 25px;
            background: #38bdf8;
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #0ea5e9;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #64748b;
        }
    </style>
</head>
<body>
<h1>Assalom {{name}}</h1>
<div class="container">

    <header>
        <div class="logo">u13 Django</div>
        <nav>
            <a href="#">Home</a>
            <a href="#">Projects</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Build Like a Pro</h1>
        <p>This is your Django project landing page. Clean design. Strong presence. No distractions.</p>
        <button class="btn">Get Started</button>
    </section>

</div>

<footer>
    © 2026 u13 Django. All rights reserved.
</footer>

</body>
</html>
