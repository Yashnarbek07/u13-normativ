{% extends 'base.html' %}

{%block title%}
    book list
{%endblock%}

{%block  main%}


<h1>Book List</h1>
<div class="books">
    {%for book in books%}
    <div class="book-card" style="width: 300px; border: 1px solid #ddd; padding: 20px; margin:20px;">
        <h2>{{ book.title }}</h2>
        <p>{{ book.description }}</p>
        <p>{{ book.created_at }}</p>

        <a href="{% url 'book_detail' book.id %}"><button>detail</button>
        </a>
                {%endfor%}
    </div>
</div>
{%endblock%}
